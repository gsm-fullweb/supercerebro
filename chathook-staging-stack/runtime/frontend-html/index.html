<!DOCTYPE html>

    <title>Kanban - Chatwoot</title>
    <!-- Anti-flash: aplica tema correto ANTES do React carregar -->
    <style>
      html { background-color: #121213; color-scheme: dark; }
    </style>
    <script>
      (function() {
        try {
          // Prioridade: URL param > localStorage > dark (default)
          var urlParams = new URLSearchParams(window.location.search);
          var urlTheme = urlParams.get('theme');
          var saved = localStorage.getItem('kanbancw-theme');
          var theme = (urlTheme === 'light' || urlTheme === 'dark') ? urlTheme
                    : (saved === 'light' || saved === 'dark') ? saved
                    : 'dark';

          if (theme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
            document.documentElement.style.backgroundColor = '#ffffff';
          } else {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
            document.documentElement.style.setProperty('background-color', '#121213', 'important');
          }
        } catch(e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
